              batch_size: 64
              max_epochs: 50
              patience: 10
          - name: bio_cnn
            model_type: bio_cnn
            hyperparameters:
              n_filters: 64
              kernel_sizes: [3, 5, 7, 9]
              fc_dims: [256, 128]
              dropout: 0.3
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
          - name: ft_transformer_default
            model_type: ft_transformer
            hyperparameters:
              d_model: 64
              n_heads: 4
              n_layers: 3
              d_ff: 128
              dropout: 0.2
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
      classification:
        advanced:
          - name: mlp
            model_type: mlp
            hyperparameters:
              hidden_dims: [256, 128]
              dropout: 0.3
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
          - name: bio_cnn
            model_type: bio_cnn
            hyperparameters:
              n_filters: 64
              kernel_sizes: [3, 5, 7, 9]
              fc_dims: [256, 128]
              dropout: 0.3
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
          - name: ft_transformer_default
            model_type: ft_transformer
            hyperparameters:
              d_model: 64
              n_heads: 4
              n_layers: 3
              d_ff: 128
              dropout: 0.2
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10

  dna:
    models:
      regression:
        advanced:
          - name: mlp
            model_type: mlp
            hyperparameters:
              hidden_dims: [256, 128]
              dropout: 0.3
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
          - name: bio_cnn
            model_type: bio_cnn
            hyperparameters:
              n_filters: 64
              kernel_sizes: [3, 5, 7, 9]
              fc_dims: [256, 128]
              dropout: 0.3
              learning_rate: 0.001
              weight_decay: 0.0001
              batch_size: 64
              max_epochs: 50
              patience: 10
      classification:
        advanced:
          - name: mlp
