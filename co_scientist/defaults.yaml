    rna: "aido_rna_1b600m"
    dna: "aido_dna_300m"
    protein: "aido_protein_16b"
    cell_expression: "aido_cell_100m"
  batch_size: 8        # batch size for embedding extraction (conservative for T4 16GB)
  max_length: 512      # max sequence length for tokenization

# ── Dataset-Specific Overrides ───────────────────────────────────────────────
# Keys must match the dataset_path exactly (e.g. "RNA/translation_efficiency_muscle").
dataset_overrides: {}
